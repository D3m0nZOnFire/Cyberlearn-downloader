<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Moodle PDF Fetcher</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #181c27; --border: #2a2f3f;
      --accent: #4f8ef7; --accent-dim: #1e2d4a;
      --text: #e8eaf0; --text-dim: #7a8099;
      --success: #3dd68c; --error: #f76f6f;
      --mono: 'DM Mono', monospace; --sans: 'DM Sans', sans-serif;
    }
    body {
      width: 300px; background: var(--bg); color: var(--text);
      font-family: var(--sans); font-size: 13px;
    }
    .header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 14px 16px 12px; display: flex; align-items: center; gap: 10px;
    }
    .header-icon { font-size: 22px; line-height: 1; }
    .header-text h1 { font-size: 13px; font-weight: 600; }
    .header-text p { font-size: 11px; color: var(--text-dim); margin-top: 1px; }

    .body { padding: 16px; display: flex; flex-direction: column; gap: 12px; }

    .field { display: flex; flex-direction: column; gap: 6px; }
    .field > label {
      font-size: 11px; font-weight: 600; color: var(--text-dim);
      text-transform: uppercase; letter-spacing: 0.08em;
    }
    .path-row {
      display: flex; align-items: stretch;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 7px; overflow: hidden; transition: border-color 0.15s;
    }
    .path-row:focus-within { border-color: var(--accent); }
    .path-prefix {
      padding: 8px 0 8px 10px; font-family: var(--mono); font-size: 12px;
      color: var(--text-dim); white-space: nowrap; user-select: none; flex-shrink: 0;
    }
    input[type="text"] {
      flex: 1; min-width: 0; background: transparent; border: none; outline: none;
      padding: 8px 10px 8px 2px; color: var(--text); font-family: var(--mono); font-size: 12px;
    }
    input[type="text"]::placeholder { color: var(--text-dim); opacity: 0.5; }
    .hint { font-size: 11px; color: var(--text-dim); line-height: 1.5; }

    .save-btn {
      background: var(--accent); color: #fff; border: none; border-radius: 6px;
      padding: 8px 14px; font-family: var(--sans); font-size: 12px; font-weight: 600;
      cursor: pointer; transition: opacity 0.15s; align-self: flex-start;
    }
    .save-btn:hover { opacity: 0.88; }

    .status {
      font-size: 11px; padding: 6px 10px; border-radius: 5px;
      display: none; align-items: center; gap: 6px;
    }
    .status.success {
      display: flex; background: rgba(61,214,140,0.1);
      border: 1px solid rgba(61,214,140,0.3); color: var(--success);
    }

    .divider { height: 1px; background: var(--border); margin: 0 -16px; }

    .how-to { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; }
    .how-to h3 { font-size: 11px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 7px; }
    .steps { display: flex; flex-direction: column; gap: 5px; }
    .step { display: flex; gap: 8px; align-items: flex-start; font-size: 11.5px; line-height: 1.45; }
    .step-num {
      background: var(--accent-dim); color: var(--accent); border-radius: 3px;
      width: 16px; height: 16px; display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 600; flex-shrink: 0; font-family: var(--mono);
    }
    .footer {
      padding: 8px 16px; border-top: 1px solid var(--border);
      font-size: 10px; color: var(--text-dim); display: flex; justify-content: space-between;
    }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); display: inline-block; margin-right: 4px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">📄</div>
    <div class="header-text">
      <h1>Moodle PDF Fetcher</h1>
      <p>Right-click any resource link to download</p>
    </div>
  </div>

  <div class="body">
    <div class="field">
      <label>Download Folder</label>
      <div class="path-row">
        <span class="path-prefix">Downloads/</span>
        <input type="text" id="subfolder" placeholder="Moodle PDFs" spellcheck="false" />
      </div>
      <p class="hint">Leave empty to save directly in Downloads/</p>
    </div>

    <div id="status" class="status"></div>

    <button class="save-btn" id="save">Save</button>

    <div class="divider"></div>

    <div class="how-to">
      <h3>How to use</h3>
      <div class="steps">
        <div class="step"><span class="step-num">1</span><span>Log in to your Moodle instance</span></div>
        <div class="step"><span class="step-num">2</span><span>Right-click any course resource link</span></div>
        <div class="step"><span class="step-num">3</span><span>Choose <strong>⬇ Download PDF (Moodle)</strong></span></div>
        <div class="step"><span class="step-num">4</span><span>File saves to your configured folder</span></div>
      </div>
    </div>
  </div>

  <div class="footer">
    <span><span class="dot"></span>Active</span>
    <span>v1.0.0</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
